<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Corridor_00</title>
  <meta http-equiv="refresh" content="0; url=./web_viewer/index.html">
  <style>
    :root {
      --bg: #050607;
      --panel: rgba(9, 11, 13, 0.9);
      --border: rgba(255, 255, 255, 0.08);
      --text: #eff4ff;
      --muted: #9aa7b1;
      --accent: #ff4f6f;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at top, rgba(124, 22, 39, 0.18), transparent 26%),
        linear-gradient(180deg, #0d1115, #050607);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(560px, 100%);
      padding: 28px 24px;
      border-radius: 26px;
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: 0 24px 72px rgba(0, 0, 0, 0.42);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(38px, 7vw, 72px);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #ffd7dd;
      font-family: "Bahnschrift SemiCondensed", "Franklin Gothic Demi Cond", "Arial Narrow", sans-serif;
      text-shadow:
        0 0 7px rgba(255, 99, 122, 0.72),
        0 0 18px rgba(255, 44, 77, 0.58);
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.6;
    }

    a {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main>
    <h1>Corridor_00</h1>
    <p>Reindirizzamento automatico al viewer realtime del progetto.</p>
    <a href="./web_viewer/index.html">Apri il progetto</a>
  </main>

  <script>
    window.location.replace("./web_viewer/index.html");
  </script>
</body>
</html>
